// ═══════ QUESTION COMPONENTS ═══════

function QInfoKids({ q }) {
  return <div className="ki"><div className="be">{q.emoji}</div><h2>{q.title}</h2><p>{q.content}</p></div>;
}
function QThanksKids({ q }) {
  return <div className="kt"><div className="be">{q.emoji}</div><h2>{q.title}</h2><p>{q.content}</p></div>;
}

function QEmojiMulti({ q, value = [], onChange }) {
  const toggle = (l) => onChange(value.includes(l) ? value.filter(v => v !== l) : [...value, l]);
  return (
    <div className="qc" style={{ border: "2px solid var(--accent-light)", borderRadius: 22 }}>
      <h3 style={{ textAlign: "center", fontSize: "1.2rem" }}>{q.question}</h3>
      {q.subtitle && <div className="qs" style={{ textAlign: "center" }}>{q.subtitle}</div>}
      <div className="eg">
        {q.options.map(o => (
          <div key={o.label} className={`ec ${value.includes(o.label) ? "sel" : ""}`} onClick={() => toggle(o.label)}>
            <span className="ee">{o.emoji}</span><span className="el">{o.label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function QEmojiChips({ q, value, onChange }) {
  return (
    <div className="qc" style={{ border: "2px solid var(--accent-light)", borderRadius: 22 }}>
      <h3 style={{ textAlign: "center", fontSize: "1.2rem" }}>{q.question}</h3>
      <div className="eg">
        {q.options.map(o => (
          <div key={o.label} className={`ec ${value === o.label ? "sel" : ""}`} onClick={() => onChange(o.label)}>
            <span className="ee">{o.emoji}</span><span className="el">{o.label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function QKidsText({ q, value, onChange }) {
  const [isRecording, setIsRecording] = useState(false);
  const [recognition, setRecognition] = useState(null);

  const toggleRecord = () => {
    if (isRecording && recognition) {
      recognition.stop();
      setIsRecording(false);
      return;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      alert("הדפדפן לא תומך בהקלטה. נסו דפדפן Chrome.");
      return;
    }

    const rec = new SpeechRecognition();
    rec.lang = "he-IL";
    rec.continuous = true;
    rec.interimResults = true;

    let finalText = value || "";

    rec.onresult = (e) => {
      let interim = "";
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const transcript = e.results[i][0].transcript;
        if (e.results[i].isFinal) {
          finalText += (finalText ? " " : "") + transcript;
          onChange(finalText);
        } else {
          interim = transcript;
        }
      }
      if (interim) onChange(finalText + (finalText ? " " : "") + interim);
    };

    rec.onerror = () => { setIsRecording(false); };
    rec.onend = () => { setIsRecording(false); };

    rec.start();
    setRecognition(rec);
    setIsRecording(true);
  };

  return (
    <div className="ktq">
      <div className="ke">{q.emoji}</div>
      <h3>{q.question}</h3>
      {q.optional && <span className="ob" style={{ marginBottom: 10 }}>לא חובה</span>}
      <div className="input-toggle">
        <button className={`toggle-btn rec-btn ${isRecording ? "recording" : ""}`} onClick={toggleRecord}>
          {isRecording ? "⏹️ עצרו הקלטה" : "🎤 דברו"}
        </button>
        <span className="toggle-or">או כתבו 👇</span>
      </div>
      {isRecording && <div className="rec-pulse">🔴 מקליט... דברו עכשיו!</div>}
      <textarea placeholder={q.placeholder} value={value || ""} onChange={e => onChange(e.target.value)} />
    </div>
  );
}

function QInfo({ q }) { return <div className="ic">{q.content}</div>; }
function QThanks({ q }) { return <div className="tc"><div className="tk">✓</div><p>{q.content}</p></div>; }

function QChips({ q, value, onChange }) {
  const [otherText, setOtherText] = useState("");
  const isOther = q.allowOther && value && !q.options.includes(value);
  return (
    <div className="qc">
      <h3>{q.question}</h3>
      <div className="cr">
        {q.options.map(o => (
          <button key={o} className={`ch ${value === o ? "sel" : ""}`} onClick={() => { onChange(o); setOtherText(""); }}>{o}</button>
        ))}
        {q.allowOther && (
          <div className="oi">
            <button className={`ch ${isOther ? "sel" : ""}`} onClick={() => onChange(otherText || "__other__")}>אחר:</button>
            {(isOther || value === "__other__") && (
              <input value={otherText} onChange={e => { setOtherText(e.target.value); onChange(e.target.value || "__other__"); }} placeholder="פרטו..." autoFocus />
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function QScale({ q, value, onChange }) {
  const nums = []; for (let i = q.min; i <= q.max; i++) nums.push(i);
  return (
    <div className="qc">
      <h3>{q.question}</h3>
      {q.subtitle && <div className="qs">{q.subtitle}</div>}
      <div className="sw">
        <div className="sr">{nums.map(n => <button key={n} className={`sb ${value === n ? "sel" : ""}`} onClick={() => onChange(n)}>{n}</button>)}</div>
      </div>
    </div>
  );
}

function QTextarea({ q, value, onChange }) {
  return (
    <div className="qc">
      <h3>{q.question}</h3>
      <textarea className="ti ar" placeholder={q.placeholder} value={value || ""} onChange={e => onChange(e.target.value)} maxLength={q.maxLen || 1000} />
      {q.maxLen && <div className="cc">{(value || "").length}/{q.maxLen}</div>}
    </div>
  );
}

function QShortText({ q, value, onChange }) {
  return (
    <div className="qc">
      <h3>{q.question}</h3>
      {q.optional && <span className="ob">שאלת רשות</span>}
      <input className="ti" type="text" placeholder={q.placeholder} value={value || ""} onChange={e => onChange(e.target.value)} />
    </div>
  );
}

function QTwoSelects({ q, value = {}, onChange }) {
  const upd = (id, v) => onChange({ ...value, [id]: v });
  return (
    <div className="qc">
      <h3>{q.question}</h3>
      <div className="ts">
        {q.fields.map(f => (
          <div key={f.id}>
            <label>{f.label}</label>
            <select className="si2" value={value[f.id] || ""} onChange={e => upd(f.id, e.target.value)}>
              <option value="">בחרו...</option>
              {f.options.map(o => <option key={o} value={o}>{o}</option>)}
            </select>
          </div>
        ))}
      </div>
    </div>
  );
}

function QRaffle({ surveyId, isKids, accentColor }) {
  const [showForm, setShowForm] = useState(false);
  const [name, setName] = useState("");
  const [phone, setPhone] = useState("");
  const [email, setEmail] = useState("");
  const [sent, setSent] = useState(false);
  const [sending, setSending] = useState(false);

  const submit = async () => {
    if (!name.trim() || !phone.trim() || !email.trim()) return;
    setSending(true);
    try {
      if (GOOGLE_SCRIPT_URL) {
        await fetch(GOOGLE_SCRIPT_URL, {
          method: "POST", mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ survey: "__raffle__", "שם מלא": name, "טלפון": phone, "דואר אלקטרוני": email, "סקר": surveyId }),
        });
      }
      setSent(true);
    } catch(e) { }
    finally { setSending(false); }
  };

  if (sent) {
    return (
      <div className="qc raffle-card" style={{ textAlign: "center" }}>
        <div style={{ fontSize: "2.5rem", marginBottom: 12 }}>🎉</div>
        <h3>{isKids ? "נרשמתם להגרלה!" : "נרשמת להגרלה!"}</h3>
        <p className="qs">בהצלחה!</p>
      </div>
    );
  }

  if (!showForm) {
    return (
      <div className="qc raffle-card" style={{ textAlign: "center" }}>
        <div style={{ fontSize: "2.5rem", marginBottom: 12 }}>🎁</div>
        <h3>{isKids ? "רוצים להשתתף בהגרלה?" : "רוצה להשתתף בהגרלה?"}</h3>
        <p className="qs">שובר BUYME בסך 250 ₪</p>
        <p className="qs" style={{ fontSize: ".78rem", marginBottom: 16 }}>הפרטים האישיים נשמרים בנפרד ואינם מקושרים לתשובות הסקר</p>
        <button className="nb pr" style={{ background: accentColor, marginBottom: 8 }} onClick={() => setShowForm(true)}>
          {isKids ? "!כן, אני רוצה 🎉" : "כן, השאר/י פרטים"}
        </button>
      </div>
    );
  }

  return (
    <div className="qc raffle-card">
      <div style={{ textAlign: "center", marginBottom: 16 }}>
        <div style={{ fontSize: "2rem", marginBottom: 8 }}>🎁</div>
        <h3>פרטים להגרלה</h3>
        <p className="qs" style={{ fontSize: ".78rem" }}>הפרטים נשמרים בנפרד ואינם מקושרים לתשובות הסקר</p>
      </div>
      <div className="raffle-fields">
        <div className="rf">
          <label>שם מלא</label>
          <input className="ti" type="text" value={name} onChange={e => setName(e.target.value)} placeholder="השם שלך" />
        </div>
        <div className="rf">
          <label>טלפון</label>
          <input className="ti" type="tel" value={phone} onChange={e => setPhone(e.target.value)} placeholder="050-0000000" dir="ltr" style={{ textAlign: "right" }} />
        </div>
        <div className="rf">
          <label>דואר אלקטרוני</label>
          <input className="ti" type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="example@email.com" dir="ltr" style={{ textAlign: "right" }} />
        </div>
      </div>
      <div style={{ textAlign: "center", marginTop: 16 }}>
        <button className="nb pr" style={{ background: accentColor }} onClick={submit} disabled={sending || !name.trim() || !phone.trim() || !email.trim()}>
          {sending ? "שולח..." : "שלח והשתתף בהגרלה 🎉"}
        </button>
      </div>
    </div>
  );
}

// ═══════ SURVEY FORM ═══════

function SurveyForm({ survey, onBack }) {
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState({});
  const [submitting, setSubmitting] = useState(false);
  const [submitted, setSubmitted] = useState(false);
  const [error, setError] = useState(null);

  const qs = survey.questions;
  const cur = qs[step];
  const isKids = survey.id === "kids";
  const nonQ = ["info", "info-kids", "thanks", "thanks-kids", "raffle"];
  const isThanks = cur.type === "thanks" || cur.type === "thanks-kids";
  const isInfo = cur.type === "info" || cur.type === "info-kids";
  const answerable = qs.filter(q => !nonQ.includes(q.type));
  const answered = qs.slice(0, step + 1).filter(q => !nonQ.includes(q.type)).length;
  const progress = isThanks ? 100 : Math.round((answered / answerable.length) * 100);

  const setAns = v => setAnswers({ ...answers, [step]: v });

  const canProceed = () => true;

  const buildPayload = () => {
    const d = { survey: survey.id };
    qs.forEach((q, i) => {
      if (nonQ.includes(q.type)) return;
      const v = answers[i];
      if (q.type === "emoji-multi") d[q.dataKey] = Array.isArray(v) ? v.join(", ") : "";
      else if (q.type === "two-selects") { if (v) q.fields.forEach(f => { d[f.id] = v[f.id] || ""; }); }
      else d[q.dataKey] = v || "";
    });
    return d;
  };

  const submit = async () => {
    setSubmitting(true); setError(null);
    try {
      if (GOOGLE_SCRIPT_URL) {
        await fetch(GOOGLE_SCRIPT_URL, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" }, body: JSON.stringify(buildPayload()) });
      }
    } catch(e) {
      console.log("fetch error (ignored for no-cors):", e);
    }
    setSubmitted(true);
    var rIdx = -1;
    for (var ri = 0; ri < qs.length; ri++) { if (qs[ri].type === "raffle") { rIdx = ri; break; } }
    setStep(rIdx >= 0 ? rIdx : qs.length - 1);
    setSubmitting(false);
  };

  // Find the last answerable step (before raffle/thanks)
  const lastAnswerIdx = qs.reduce((last, q, i) => nonQ.includes(q.type) ? last : i, 0);
  const isRaffle = cur.type === "raffle";

  const next = () => {
    if (isRaffle) { setStep(qs.length - 1); return; }
    if (step < lastAnswerIdx) { setStep(step + 1); return; }
    if (step === lastAnswerIdx && !submitted) { submit(); return; }
    setStep(step + 1);
  };
  const prev = () => { if (step > 0) setStep(step - 1); };

  const c = survey.color;
  const style = { "--accent": c.accent, "--accent-light": c.light, "--accent-hover": c.hover };

  const renderQ = () => {
    switch (cur.type) {
      case "info-kids": return <QInfoKids q={cur} />;
      case "thanks-kids": return <QThanksKids q={cur} />;
      case "emoji-multi": return <QEmojiMulti q={cur} value={answers[step] || []} onChange={setAns} />;
      case "emoji-chips": return <QEmojiChips q={cur} value={answers[step]} onChange={setAns} />;
      case "kids-text": return <QKidsText q={cur} value={answers[step]} onChange={setAns} />;
      case "info": return <QInfo q={cur} />;
      case "thanks": return <QThanks q={cur} />;
      case "raffle": return <QRaffle surveyId={survey.id} isKids={isKids} accentColor={c.accent} />;
      case "chips": return <QChips q={cur} value={answers[step]} onChange={setAns} />;
      case "scale": return <QScale q={cur} value={answers[step]} onChange={setAns} />;
      case "textarea": return <QTextarea q={cur} value={answers[step]} onChange={setAns} />;
      case "short-text": return <QShortText q={cur} value={answers[step]} onChange={setAns} />;
      case "two-selects": return <QTwoSelects q={cur} value={answers[step] || {}} onChange={setAns} />;
      default: return null;
    }
  };

  return (
    <div className="svc" style={style}>
      <div className="svt">
        <button className="bb" onClick={onBack}>→</button>
        <h2>{survey.icon} {survey.title}</h2>
      </div>
      <div className="prg">
        <div className="prg-bar"><div className="prg-fill" style={{ width: `${progress}%`, background: c.accent }} /></div>
        <div className="prg-txt">{isThanks ? "הושלם!" : `${answered} מתוך ${answerable.length}`}</div>
      </div>
      {submitting ? (
        <div className="qc subm"><div className="spn" /><span>שולח את התשובות...</span></div>
      ) : (
        <>
          {renderQ()}
          {error && <div className="err">{error}</div>}
          {!isThanks ? (
            <div className={`nr ${isKids ? "kn" : ""}`}>
              <button className="nb pr" onClick={next}>
                {isRaffle ? (isKids ? "!המשך ➜" : "המשך") : step === lastAnswerIdx ? (isKids ? "שליחה! 🚀" : "שליחה") : (isKids ? "!הבא ➜" : "הבא")}
              </button>
              <div className="nr-side">
                {!isInfo && <button className="nb sk" onClick={next}>{isKids ? "דלגו ⏭️" : "דלג"}</button>}
                {step > 0 && <button className="nb se" onClick={prev}>{isKids ? "⬅ הקודם" : "הקודם"}</button>}
              </div>
            </div>
          ) : (
            <div style={{ textAlign: "center" }}>
              <button className="nb pr hr" style={{ background: c.accent }} onClick={onBack}>חזרה למסך הראשי</button>
            </div>
          )}
        </>
      )}
    </div>
  );
}

            <h3>{s.title}</h3>
            <p>{s.subtitle}</p>
            <button className="copy-link-btn" onClick={(e) => copyLink(e, s.id)} title="העתק קישור לסקר">
              {copied === s.id ? "✓ הקישור הועתק!" : "🔗 העתק קישור"}
            </button>
          </div>
        ))}
      </div>
      {copied && <div className="toast-copied">הקישור הועתק ללוח!</div>}
      <div style={{ textAlign: "center", marginTop: 24 }}>
        <a href="https://docs.google.com/spreadsheets/d/1TI4DpKWE5SZtZhdPn9p-XHnaS1Qgxp8YGJFNwajybzI/edit?pli=1&gid=0#gid=0" target="_blank" rel="noopener noreferrer" className="results-btn">📊 מעבר לתוצאות הסקרים</a>
      </div>
    </div>
  );
}

function App() {
  const getHashSurvey = () => {
    const h = window.location.hash.replace("#", "");
    return ALL[h] ? h : null;
  };

  const [active, setActive] = useState(getHashSurvey);

  const select = (id) => {
    window.location.hash = id;
    setActive(id);
  };

  const goHome = () => {
    history.replaceState(null, "", window.location.pathname);
    setActive(null);
  };

  return (
    <>
      <style>{css}</style>
      <div className="app">
        {active ? <SurveyForm key={active} survey={ALL[active]} onBack={goHome} /> : <HomeScreen onSelect={select} />}
      </div>
    </>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
